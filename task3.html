<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> </h1>
    <script>

        var num1=Number(prompt("Enter one number"));
        var num2=Number(prompt("Enter second number"));
        var ch=Number(prompt("-----operations-----\n1.Addition\n2.substration\n3.Multiplication\n4.Division"))
        switch(ch){
            case 1:document.write("<h1>Addition is :"+(num1+num2)+"</h1");break;
             case 2:document.write("<h1>Subtraction is :"+(num1-num2)+"</h1");break;
                case 3:document.write("<h1>Multiplication is :"+(num1*num2)+"</h1");break;
                    case 4:document.write("<h1>Division is :"+(num1/num2)+"</h1");break;
            
        
        }
    
    </script>
    
</body>
</html>
